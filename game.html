<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中国跳棋 - 在线对战</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .back-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #2c3e50;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  .back-btn {
    color: #ecf0f1;
    font-size: 13px;
    text-decoration: none;
    opacity: .7;
    transition: opacity .15s;
  }
  .back-btn:hover { opacity: 1; }
  .back-bar-title { color: #ecf0f1; font-size: 14px; font-weight: 700; }
  .back-bar-user  { margin-left: auto; font-size: 12px; color: #aaa; }
</style>
</head>
<body>

  <!-- 顶部返回栏 -->
  <div class="back-bar">
    <a href="select.html" class="back-btn">← 返回选择</a>
    <span class="back-bar-title">中国跳棋 · 在线对战</span>
    <span class="back-bar-user" id="bar-user"></span>
  </div>

  <!-- 大厅遮罩 -->
  <div id="lobby-overlay" class="lobby-overlay">
    <div class="lobby-box">
      <h2 class="lobby-title">中国跳棋</h2>
      <p class="lobby-sub">旋转圆盘 · 卡牌抽取 · 在线双人对战</p>

      <div id="lobby-status" class="lobby-status">正在连接服务器…</div>

      <div class="lobby-actions">
        <button id="btn-create-room" class="lobby-btn primary" disabled>
          ＋ 创建房间
        </button>
        <div class="lobby-divider"><span>或者</span></div>
        <div class="lobby-join-row">
          <input id="room-id-input" class="lobby-input"
                 placeholder="输入6位房间号" maxlength="6" disabled>
          <button id="btn-join-room" class="lobby-btn" disabled>加入</button>
        </div>
      </div>

      <div id="lobby-room-info" class="lobby-room-info hidden">
        <p>把房间号发给对方：</p>
        <div class="room-id-row">
          <span id="room-id-display" class="room-id-display"></span>
          <button id="btn-copy-room" class="copy-btn">复制</button>
        </div>
        <p class="lobby-waiting">等待对方加入…</p>
      </div>

      <p id="player-label" class="player-label"></p>
    </div>
  </div>

  <!-- 游戏主界面 -->
  <div class="main-frame">
    <div class="left-frame">
      <canvas id="board-canvas" width="600" height="700"></canvas>
    </div>

    <div class="right-frame">
      <h1>中国跳棋</h1>

      <div id="status-box" class="status-box"></div>
      <div id="hand-count" class="hand-count"></div>

      <div class="btn-row">
        <button id="btn-reset">重新开始</button>
        <button id="btn-end-jump" disabled>结束跳跃</button>
      </div>

      <h2>① 走棋 / 跳棋</h2>
      <p class="hint">点击己方棋子选中，再点棋盘上高亮的位置完成移动或跳跃。</p>

      <hr>

      <h2>② 打出卡牌转圆盘（与①二选一）</h2>
      <div class="circle-btns">
        <button id="circle-A" class="circle-btn" style="background:#e67e22">圆盘 A（橙）</button>
        <button id="circle-B" class="circle-btn" style="background:#9b59b6">圆盘 B（紫）</button>
        <button id="circle-C" class="circle-btn" style="background:#16a085">圆盘 C（青）</button>
      </div>

      <div class="dir-row">
        <label><input type="radio" name="dir" id="dir-cw"  value="cw">  顺时针 ↻</label>
        <label><input type="radio" name="dir" id="dir-ccw" value="ccw" checked> 逆时针 ↺</label>
      </div>

      <p class="label-sm">选择要打出的卡牌（决定旋转格数）:</p>
      <div id="card-select" class="card-select"></div>

      <div class="btn-row">
        <button id="btn-confirm" class="confirm-btn" disabled>确认旋转</button>
        <button id="btn-cancel" disabled>取消</button>
      </div>

      <p class="tip">
        提示：每张卡牌标注固定的旋转格数(1格=60°)，打出后即消耗，手牌打光后将无法再旋转圆盘
        （仍可正常走棋/跳跃）。转圆盘会带动盘内所有同心环上的棋子（含对方棋子）整体一起转动，圆心棋子不动。
      </p>
    </div>
  </div>

  <div id="win-banner" class="win-banner hidden"></div>

  <script src="js/boardGeometry.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/gameState.js"></script>
  <script src="js/render.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 显示登录用户名
    const u = localStorage.getItem('cc_user');
    const el = document.getElementById('bar-user');
    if (el) el.textContent = u ? ('👤 ' + u) : '游客模式';
  </script>
</body>
</html>
