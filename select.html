<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>选择游戏模式 - 中国跳棋</title>
<link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">中国跳棋</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <main class="select-page">
    <h1>开始游戏</h1>
    <p class="page-sub">选择游戏模式和玩家人数</p>

    <!-- 对手类型 -->
    <p class="section-title">对手类型</p>
    <div class="mode-grid">

      <div class="mode-card coming-soon" data-mode="ai">
        <div class="badge-soon">即将推出</div>
        <div class="mode-icon">🤖</div>
        <div class="mode-title">与 AI 对战</div>
        <div class="mode-desc">挑战电脑对手，练习棋技</div>
      </div>

      <div class="mode-card selected" data-mode="online" onclick="selectMode('online')">
        <div class="mode-icon">🌐</div>
        <div class="mode-title">在线对战</div>
        <div class="mode-desc">创建或加入房间，与真实玩家对战</div>
      </div>

    </div>

    <!-- 玩家人数 -->
    <p class="section-title">玩家人数</p>
    <div class="players-grid">

      <div class="player-chip selected" data-players="2" onclick="selectPlayers(2)">
        <div class="chip-num">2</div>
        <div class="chip-sub">人对战</div>
      </div>

      <div class="player-chip" data-players="4" onclick="selectPlayers(4)">
        <div class="chip-num">4</div>
        <div class="chip-sub">人对战</div>
      </div>

      <div class="player-chip" data-players="6" onclick="selectPlayers(6)">
        <div class="chip-num">6</div>
        <div class="chip-sub">人对战</div>
      </div>

    </div>

    <!-- 开始按钮 -->
    <button class="btn btn-primary start-btn" id="start-btn" onclick="startGame()">
      开始游戏 →
    </button>

    <!-- 提示文字（非法组合时显示） -->
    <p id="select-hint" style="margin-top:14px;font-size:13px;color:var(--text-soft);"></p>
  </main>

<script>
  let chosenMode    = 'online';
  let chosenPlayers = 2;

  // 导航栏
  const user = localStorage.getItem('cc_user');
  const nav  = document.getElementById('nav-links');
  if (user) {
    nav.innerHTML =
      `<span class="nav-user">👤 <span>${user}</span></span>
       <button class="btn btn-ghost" style="padding:8px 14px;font-size:13px"
         onclick="localStorage.removeItem('cc_user');location.href='index.html'">退出</button>`;
  } else {
    nav.innerHTML =
      `<a href="auth.html" class="btn btn-ghost" style="padding:8px 14px;font-size:13px">登录 / 注册</a>`;
  }

  function selectMode(mode) {
    document.querySelectorAll('.mode-card:not(.coming-soon)').forEach(el => {
      el.classList.toggle('selected', el.dataset.mode === mode);
    });
    chosenMode = mode;
    updateHint();
  }

  function selectPlayers(n) {
    document.querySelectorAll('.player-chip:not(.coming-soon)').forEach(el => {
      el.classList.toggle('selected', Number(el.dataset.players) === n);
    });
    chosenPlayers = n;
    updateHint();
  }

  function updateHint() {
    const hint = document.getElementById('select-hint');
    hint.style.color = 'var(--text-soft)';
    if (chosenMode === 'ai') {
      hint.textContent = '⚠ AI对战即将推出';
    } else {
      hint.textContent = `✅ 已选：在线对战 · ${chosenPlayers}人`;
    }
  }

  function startGame() {
    if (chosenMode !== 'online') {
      document.getElementById('select-hint').textContent = '⚠ AI对战即将推出，敬请期待！';
      document.getElementById('select-hint').style.color = 'var(--p1)';
      return;
    }
    location.href = `game.html?players=${chosenPlayers}`;
  }

  updateHint();
</script>
</body>
</html>
