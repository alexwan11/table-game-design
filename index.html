<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>中国跳棋 - 在线对战</title>
<link rel="stylesheet" href="css/pages.css">
</head>
<body class="home-page">

  <nav class="navbar">
    <div class="nav-logo">中国跳棋</div>
    <div class="nav-links" id="nav-links">
      <!-- 由 JS 根据登录状态填充 -->
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="hero-content">
        <p class="hero-eyebrow">在线双人对战</p>
        <h1 class="hero-title">中国<br><span class="accent">跳棋</span></h1>
        <p class="hero-desc">
          经典六角星棋盘，加入<strong style="color:var(--gold)">旋转圆盘</strong>与<strong style="color:var(--gold)">卡牌抽取</strong>机关——
          每一局都充满变数，运气与策略并重。
        </p>
        <div class="hero-btns">
          <a href="select.html" class="btn btn-primary">立即游玩 →</a>
          <a href="auth.html"   class="btn btn-ghost"  id="auth-cta">登录 / 注册</a>
        </div>
      </div>

      <!-- 装饰性六角棋盘点阵 -->
      <div class="hex-visual" aria-hidden="true">
        <div class="hex h-red"></div>  <div class="hex h-red"></div>  <div class="hex"></div>     <div class="hex"></div>     <div class="hex"></div>
        <div class="hex h-red"></div>  <div class="hex h-red"></div>  <div class="hex h-red"></div><div class="hex"></div>     <div class="hex"></div>
        <div class="hex"></div>        <div class="hex h-gold"></div> <div class="hex h-gold"></div><div class="hex h-gold"></div><div class="hex"></div>
        <div class="hex"></div>        <div class="hex"></div>        <div class="hex h-blue"></div><div class="hex h-blue"></div><div class="hex h-blue"></div>
        <div class="hex"></div>        <div class="hex"></div>        <div class="hex"></div>      <div class="hex h-blue"></div><div class="hex h-blue"></div>
      </div>
    </section>

    <section class="features">
      <div class="feat-card">
        <div class="feat-icon">🔄</div>
        <h3>旋转圆盘机关</h3>
        <p>棋盘中央有三个互相重叠的圆盘，打出卡牌可旋转，带动盘内所有棋子移动，打乱敌我阵型。</p>
      </div>
      <div class="feat-card">
        <div class="feat-icon">🎴</div>
        <h3>Gacha 抽卡系统</h3>
        <p>开局双方各随机抽取 5 张旋转卡牌，稀有卡可旋转更大角度，卡牌组合暗藏策略。</p>
      </div>
      <div class="feat-card">
        <div class="feat-icon">🌐</div>
        <h3>实时在线对战</h3>
        <p>创建房间，把 6 位房间号分享给好友，随时随地在线联机，实时同步游戏状态。</p>
      </div>
    </section>
  </main>

<script>
  // 根据登录状态显示导航右侧内容
  const user = localStorage.getItem('cc_user');
  const nav  = document.getElementById('nav-links');
  if (user) {
    nav.innerHTML =
      `<span class="nav-user">👤 <span>${user}</span></span>
       <a href="select.html" class="btn btn-primary" style="padding:8px 16px;font-size:13px">开始游戏</a>
       <button class="btn btn-ghost" style="padding:8px 16px;font-size:13px"
         onclick="localStorage.removeItem('cc_user');location.reload()">退出</button>`;
    // 已登录，隐藏"登录/注册"的 hero CTA
    const cta = document.getElementById('auth-cta');
    if (cta) cta.style.display = 'none';
  } else {
    nav.innerHTML =
      `<a href="auth.html"                class="btn btn-ghost"   style="padding:8px 16px;font-size:13px">登录</a>
       <a href="auth.html?tab=register"   class="btn btn-primary" style="padding:8px 16px;font-size:13px">注册</a>`;
  }
</script>
</body>
</html>
